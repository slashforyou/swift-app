name: E2E Tests (Maestro)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      flow:
        description: "Maestro flow file to run (relative to e2e/flows/)"
        required: false
        default: "001-launch-login-calendar.yaml"

jobs:
  e2e-android:
    name: E2E — Android (Maestro)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java / Android SDK ─────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Node / Expo ────────────────────────────────────────────────────────
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Install Maestro ────────────────────────────────────────────────────
      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ── Download Expo Go APK ───────────────────────────────────────────────
      - name: Download Expo Go APK
        run: |
          EXPO_GO_URL=$(curl -s "https://expo.dev/--/api/v2/versions" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['androidUrl'])")
          echo "Downloading Expo Go from: $EXPO_GO_URL"
          curl -L "$EXPO_GO_URL" -o expo-go.apk

      # ── Android Emulator ───────────────────────────────────────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── Run everything in a single emulator session ────────────────────────
      - name: Run E2E tests
        uses: ReactiveCircus/android-emulator-runner@v2
        env:
          EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          EXPO_NO_DOTENV: "1"
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          avd-name: maestro-avd
          emulator-options: "-no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none"
          disable-animations: true
          script: |
            # Install Expo Go on emulator
            adb install -r expo-go.apk

            # Start Metro bundler in background
            npx expo start --android --non-interactive &
            METRO_PID=$!

            # Wait for Metro to be ready (up to 2 min)
            for i in $(seq 1 24); do
              if curl -s http://localhost:8081/status | grep -q packager-status:running; then
                echo "✅ Metro is ready"
                break
              fi
              echo "Waiting for Metro... ($i/24)"
              sleep 5
            done

            # Give app time to load on emulator
            sleep 10

            # Run Maestro flow
            maestro test e2e/flows/${{ github.event.inputs.flow || '001-launch-login-calendar.yaml' }} \
              --env EMAIL="$EMAIL" \
              --env PASSWORD="$PASSWORD" \
              --format junit \
              --output e2e-results.xml

      # ── Upload results ─────────────────────────────────────────────────────
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-results
          path: |
            e2e-results.xml
            ~/.maestro/tests/
          retention-days: 7

      - name: Upload Maestro screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: maestro-screenshots-${{ github.run_number }}
          path: ~/.maestro/tests/
          retention-days: 7
