name: E2E Tests (Maestro)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      flow:
        description: "Maestro flow file to run (relative to e2e/flows/)"
        required: false
        default: "001-launch-login-calendar.yaml"

env:
  # Opt into Node.js 24 for all actions (Node 20 deprecated June 2026)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  e2e-android:
    name: E2E — Android (Maestro)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java / Android SDK ─────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── Node / Expo ────────────────────────────────────────────────────────
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # ── Install Maestro ────────────────────────────────────────────────────
      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      # ── Prepare results directory ──────────────────────────────────────────
      - name: Create results directory
        run: mkdir -p $HOME/.maestro/tests

      # ── Download Expo Go APK ───────────────────────────────────────────────
      - name: Download Expo Go APK
        run: |
          EXPO_GO_URL=$(curl -s "https://expo.dev/--/api/v2/versions" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['androidUrl'])")
          echo "Downloading Expo Go from: $EXPO_GO_URL"
          curl -L "$EXPO_GO_URL" -o expo-go.apk
          ls -la expo-go.apk

      # ── Android Emulator ───────────────────────────────────────────────────
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ── Run everything in a single emulator session ────────────────────────
      - name: Run E2E tests
        uses: ReactiveCircus/android-emulator-runner@v2
        env:
          EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          EXPO_NO_DOTENV: "1"
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          avd-name: maestro-avd
          emulator-options: "-no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none"
          disable-animations: true
          script: |
            set -e

            echo "=== Emulator status ==="
            adb devices
            adb shell getprop ro.build.version.sdk

            # Install Expo Go on emulator
            echo "=== Installing Expo Go ==="
            adb install -r expo-go.apk
            echo "Expo Go installed"

            # Start Metro bundler in background (without --android to avoid auto-open)
            echo "=== Starting Metro bundler ==="
            npx expo start --non-interactive 2>&1 | tee metro.log &
            METRO_PID=$!

            # Wait for Metro to be ready (up to 3 min)
            echo "=== Waiting for Metro ==="
            METRO_READY=false
            for i in $(seq 1 36); do
              if curl -s http://localhost:8081/status 2>/dev/null | grep -q packager-status:running; then
                echo "Metro is ready after $((i * 5))s"
                METRO_READY=true
                break
              fi
              echo "Waiting for Metro... ($i/36)"
              sleep 5
            done

            if [ "$METRO_READY" != "true" ]; then
              echo "ERROR: Metro did not start in time"
              cat metro.log || true
              exit 1
            fi

            # Open the app in Expo Go via deep link
            echo "=== Launching app in Expo Go ==="
            adb shell am start -a android.intent.action.VIEW \
              -d "exp://127.0.0.1:8081" \
              host.exp.exponent

            # Wait for the JS bundle to load (emulator is slow on CI)
            echo "=== Waiting for app to load ==="
            sleep 30

            # Take a diagnostic screenshot before running tests
            adb shell screencap -p /sdcard/pre-test-screenshot.png
            adb pull /sdcard/pre-test-screenshot.png $HOME/.maestro/tests/pre-test-screenshot.png || true

            # Verify env vars are set
            if [ -z "$EMAIL" ] || [ -z "$PASSWORD" ]; then
              echo "WARNING: E2E_TEST_EMAIL or E2E_TEST_PASSWORD secrets are not set"
            fi

            # Run Maestro flow
            echo "=== Running Maestro tests ==="
            FLOW_FILE="${{ github.event.inputs.flow || '001-launch-login-calendar.yaml' }}"
            maestro test "e2e/flows/${FLOW_FILE}" \
              --env EMAIL="${EMAIL}" \
              --env PASSWORD="${PASSWORD}" \
              --format junit \
              --output e2e-results.xml \
              --debug-output $HOME/.maestro/tests/ \
              || TEST_EXIT=$?

            # Capture post-test screenshot on failure
            if [ "${TEST_EXIT:-0}" != "0" ]; then
              echo "=== Test failed (exit $TEST_EXIT), capturing diagnostics ==="
              adb shell screencap -p /sdcard/post-test-screenshot.png
              adb pull /sdcard/post-test-screenshot.png $HOME/.maestro/tests/post-test-screenshot.png || true
              adb logcat -d -t 200 > $HOME/.maestro/tests/logcat.txt || true
              cat metro.log > $HOME/.maestro/tests/metro.log || true
            fi

            # Copy all results to workspace for artifact upload (~ doesn't expand in YAML)
            mkdir -p e2e-artifacts
            cp -r $HOME/.maestro/tests/* e2e-artifacts/ 2>/dev/null || true
            cp metro.log e2e-artifacts/ 2>/dev/null || true

            exit ${TEST_EXIT:-0}

      # ── Upload results ─────────────────────────────────────────────────────
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-results
          path: |
            e2e-results.xml
            e2e-artifacts/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload Maestro screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: maestro-screenshots-${{ github.run_number }}
          path: e2e-artifacts/
          if-no-files-found: warn
          retention-days: 7
