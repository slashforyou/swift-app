name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /srv/www/htdocs/swiftapp/server

            # Pull latest changes
            git pull origin main

            # Install dependencies if package.json changed
            npm install --production

            # Run safe migrations only (additive, never destructive)
            # Migrations must use: CREATE TABLE IF NOT EXISTS, ALTER TABLE ADD COLUMN IF NOT EXISTS
            # NEVER: DROP, DELETE, TRUNCATE

            # Restart the application
            pm2 restart swiftapp

            echo "✅ Deployment complete"
